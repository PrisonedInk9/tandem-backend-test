steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tandem-backend:latest'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tandem-backend'
      - '--image=gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}'
      - '--update-secrets=DATABASE_URL=database-url:latest'
      - '--update-secrets=ALLOWED_HOSTS=allowed-hosts:latest'
      - '--update-secrets=SECRET_KEY=secret-key:latest'
      - '--set-env-vars=DEBUG=False'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/tandem-backend:latest'

substitutions:
  _CLOUD_SQL_INSTANCE: 'PROJECT_ID:REGION:INSTANCE_NAME'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitution_option: 'ALLOW_LOOSE'