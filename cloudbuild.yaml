steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/tandem-backend:latest'
      - '.'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'

  # Step 3: Deploy to Cloud Run
    name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'tandem-backend-test'
      - '--image=gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'
      - '--region=europe-west3'
      - '--platform=managed'
      - '--network=webapp-vpc-test'
      - '--subnet=webapp-test-subnet-1'
      - '--network-interface=eth0'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--update-secrets=DATABASE_URL=database-url:latest'
      - '--update-secrets=ALLOWED_HOSTS=allowed-hosts:latest'
      - '--update-secrets=SECRET_KEY=secret-key:latest'
      - '--set-env-vars=DEBUG=False'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/tandem-backend:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/tandem-backend:latest'

substitutions:
  _CLOUD_SQL_INSTANCE: 'webapp-test-project-487812:europe-west3:webapp-test-postgresql'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
  substitution_option: 'ALLOW_LOOSE'