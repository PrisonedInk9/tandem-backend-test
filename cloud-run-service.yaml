apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: tandem-backend
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '10'
        autoscaling.knative.dev/minScale: '1'
    spec:
      serviceAccountName: tandem-backend
      containers:
        - image: gcr.io/PROJECT_ID/tandem-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: DEBUG
              value: 'False'
            - name: ALLOWED_HOSTS
              value: 'tandem-backend.run.app,YOUR_CUSTOM_DOMAIN.com'
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: tandem-secrets
                  key: secret-key
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: tandem-secrets
                  key: database-url
          resources:
            requests:
              cpu: '1'
              memory: '512Mi'
            limits:
              cpu: '2'
              memory: '1Gi'
      # VPC connector for private IP access to Cloud SQL
      vpcAccess:
        connector: projects/PROJECT_ID/locations/europe-west1/connectors/CONNECTOR_NAME
        egress: all-traffic
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tandem-backend
  namespace: default
