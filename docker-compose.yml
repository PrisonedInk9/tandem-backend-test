version: '3.9'

services:
  web:
    build: .
    container_name: tandem_web
    environment:
      DEBUG: ${DEBUG:-False}
      SECRET_KEY: ${SECRET_KEY:-your-secret-key-change-in-production}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_URL: ${DATABASE_URL:-postgresql://tandem_user:tandem_password@localhost:5432/tandem_db}
    ports:
      - "8080:8080"
    restart: unless-stopped
